events {
    worker_connections 1024;
}

http {
    # ip_hash es crítico para Socket.IO para mantener al cliente conectado al mismo hilo/proceso
    upstream chat_cluster {
        ip_hash;
        server chat-app:3000;
        server chat-app:3001;
        server chat-app:3002;
        server chat-app:3003;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://chat_cluster;
            
            # Cabeceras obligatorias para habilitar WebSockets (Upgrade de HTTP)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Pasar información del cliente real a Node.js
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
