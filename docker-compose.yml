version: '3.8'

services:
  chat-app:
    build: .
    restart: always
    environment:
      - PORT=3000
    deploy:
      replicas: 4
    volumes:
      - chat-data:/app/data
    networks:
      - chat-network

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chat-app
    networks:
      - chat-network

  cron-notifier:
    image: php:8.2-alpine
    volumes:
      - ./notificador.php:/app/notificador.php:ro
    entrypoint: ["sh", "-c", "while true; do php /app/notificador.php; sleep 60; done"]
    depends_on:
      - gateway
    networks:
      - chat-network

volumes:
  chat-data:

networks:
  chat-network:
