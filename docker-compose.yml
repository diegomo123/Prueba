version: '3.8'

services:
  # Servicio de la aplicación Node.js
  chat-app:
    build: .
    restart: always
    environment:
      - PORT=3000
    volumes:
      - ./data:/app/data 
    networks:
      - chat-network

  # Servicio del Balanceador de Carga (Nginx)
  gateway:
    image: nginx:alpine
    ports:
      - "80:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chat-app
    networks:
      - chat-network

volumes:
  chat-data:

networks:
  chat-network:
